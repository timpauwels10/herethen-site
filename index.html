<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HereThen — Location intelligence</title>
<meta name="description" content="HereThen — B2B location intelligence. By Train of Thoughts.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root {
    --paper:  #fcfcfb;
    --ink:    #14161a;
    --muted:  #9296a0;
    --line:   #ededeb;
    --accent: #ed7a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; min-height: 100vh;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  main {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8vh 7vw;
  }
  .ringmark {
    width: clamp(56px, 11vw, 92px);
    height: clamp(56px, 11vw, 92px);
    margin-bottom: clamp(1.1rem, 2.4vw, 1.8rem);
    opacity: 1;
    animation: drop 0.8s cubic-bezier(0.34, 1.35, 0.5, 1) both;
    animation-delay: 0.3s;
  }
  .wordmark {
    font-weight: 600;
    font-size: clamp(3rem, 12vw, 6.8rem);
    line-height: 1;
    letter-spacing: -0.04em;
    opacity: 1;
    animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .wordmark .t { color: var(--accent); }
  @keyframes rise { from { opacity: 0; transform: translateY(0.12em); } to { opacity: 1; transform: none; } }
  @keyframes drop { 0% { opacity: 0; transform: translateY(-0.7em) scale(0.9); } 60% { opacity: 1; } 100% { opacity: 1; transform: none; } }
  .tagline {
    margin-top: 1.8rem;
    font-size: clamp(1rem, 2.3vw, 1.22rem);
    line-height: 1.45;
    color: var(--ink);
    max-width: 24ch;
    font-weight: 400;
    opacity: 1;
    animation: fade 0.9s ease 0.7s both;
  }
  .contact {
    margin-top: 2.6rem;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    opacity: 1;
    animation: fade 0.9s ease 0.95s both;
  }
  .contact a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1.5px solid rgba(237,122,26,0.35);
    padding-bottom: 2px;
    transition: color 0.18s ease, border-color 0.18s ease;
  }
  .contact a:hover, .contact a:focus-visible {
    color: var(--accent); border-color: var(--accent); outline: none;
  }
  .contact a:focus-visible { outline: 2px solid var(--accent); outline-offset: 5px; border-radius: 2px; }
  @keyframes fade { from { opacity: 0; transform: translateY(0.4rem); } to { opacity: 1; transform: none; } }
  footer {
    padding: 1.8rem 7vw 2.2rem;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.012em;
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 0.3rem 1.2rem;
  }
  footer .sep { color: var(--line); }
  @media (prefers-reduced-motion: reduce) {
    .ringmark, .wordmark, .tagline, .contact { animation: none; }
  }
</style>
</head>
<body>
  <main>
    <svg class="ringmark" viewBox="0 0 80 80" role="img" aria-label="HereThen">
      <title>HereThen</title>
      <circle cx="40" cy="40" r="38" fill="none" stroke="#ed7a1a" stroke-width="1.5" opacity="0.18"/>
      <circle cx="40" cy="40" r="26" fill="none" stroke="#ed7a1a" stroke-width="1.5" opacity="0.4"/>
      <circle cx="40" cy="40" r="14" fill="none" stroke="#ed7a1a" stroke-width="1.5" opacity="0.7"/>
      <circle cx="40" cy="40" r="6.5" fill="#ed7a1a"/>
    </svg>
    <div class="wordmark" aria-label="HereThen">Here<span class="t">Then</span></div>
    <p class="tagline">Location intelligence for where your network goes next.</p>
    <p class="contact"><a href="mailto:tim@trainofthoughts.be">tim@trainofthoughts.be</a></p>
  </main>
  <footer>
    <span>HereThen — a product by Train of Thoughts BV</span>
    <span class="sep">·</span>
    <span>Sint-Niklaas, Belgium</span>
  </footer>
</body>
</html>
